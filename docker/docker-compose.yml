version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: home-ellie-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=ellie-cluster
      - node.name=home-ellie-es
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - ellie-es-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    mem_limit: 1g
    ulimits:
      memlock:
        soft: -1
        hard: -1

  obsidian-remote:
    image: ghcr.io/sytone/obsidian-remote:latest
    container_name: ellie-obsidian
    ports:
      - "127.0.0.1:8083:8080"
    volumes:
      - /home/ellie/obsidian-vault:/vaults/vault
      - ellie-obsidian-config:/config
      - ./obsidian-autostart:/config/.config/openbox/autostart:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - CUSTOM_RES=1920x1080
    restart: unless-stopped

volumes:
  ellie-es-data:
    driver: local
  ellie-obsidian-config:
    driver: local
